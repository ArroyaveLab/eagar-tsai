<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 140" width="140" height="140">
  <defs>
    <style>
      .bg-hex { fill: #F4F7F9; stroke: #000000; stroke-width: 6; stroke-linejoin: round; }
      .pool-outer { fill: #8AC4D0; stroke: #000000; stroke-width: 6; stroke-linejoin: round; }
      .pool-inner { fill: #FFFFFF; stroke: #000000; stroke-width: 6; stroke-linejoin: round; }
      .crosshair { fill: none; stroke: #000000; stroke-width: 4; stroke-dasharray: 6, 6; stroke-linecap: round; }
      .center-dot { fill: #000000; }
    </style>
  </defs>

  <!-- ICON GROUP -->
  <g transform="translate(10, 10)">
    <!-- Base Hexagon -->
    <!-- Center is 60,60 with a radius of 55 -->
    <polygon class="bg-hex" points="60,5 108,32.5 108,87.5 60,115 12,87.5 12,32.5" />

    <!-- Outer Eagar-Tsai Thermal Contour (Melt Pool) -->
    <!-- Uses an arc and a line to create the classic moving heat source teardrop -->
    <path class="pool-outer" d="M 70,30 A 30,30 0 1,1 70,90 L 15,60 Z" />

    <!-- Inner Contour (Solidus / Peak Temp boundary) -->
    <path class="pool-inner" d="M 70,42 A 18,18 0 1,1 70,78 L 35,60 Z" />

    <!-- Scientific Crosshairs / Calibration Marks -->
    <line class="crosshair" x1="70" y1="12" x2="70" y2="108" />
    <line class="crosshair" x1="12" y1="60" x2="108" y2="60" />

    <!-- Heat Source / Laser Center Point -->
    <circle class="center-dot" cx="70" cy="60" r="7" />
  </g>
</svg>
